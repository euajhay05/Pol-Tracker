<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pol Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:oklch(0.97 0.008 150);
    --sidebar:oklch(1 0 0);
    --panel:oklch(1 0 0);
    --panel2:oklch(0.97 0.006 150);
    --card:oklch(0.97 0.006 150);
    --card2:oklch(0.96 0.01 150);
    --border:oklch(0 0 0 / 0.07);
    --border2:oklch(0 0 0 / 0.05);
    --border3:oklch(0 0 0 / 0.08);
    --text:oklch(0.22 0.02 150);
    --text-dim:oklch(0.45 0.015 150);
    --text-dim2:oklch(0.48 0.015 150);
    --text-dim3:oklch(0.5 0.015 150);
    --text-dim4:oklch(0.55 0.015 150);
    --accent1:oklch(0.55 0.14 150);
    --accent2:oklch(0.42 0.12 155);
    --accent-on:oklch(1 0 0);
    --teal:oklch(0.55 0.12 175);
    --danger:oklch(0.58 0.19 25);
    --warn:oklch(0.58 0.16 80);
    --good:oklch(0.5 0.15 150);
    --pending:oklch(0.62 0.17 45);
    --track:oklch(0.91 0.012 150);
    --track2:oklch(0.89 0.012 150);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:oklch(0.8 0.015 150);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}

  .app-shell{display:flex;height:100vh;width:100%;overflow:hidden}
  .sidebar{width:220px;flex:none;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 16px;gap:28px;overflow-y:auto}
  .logo-wrap{display:flex;align-items:center;gap:9px;padding:0 8px}
  .logo-badge{background:oklch(1 0 0);border:1px solid oklch(0 0 0 / 0.08);border-radius:6px;padding:8px 14px;display:flex;align-items:center;justify-content:center;color:#141019;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:-0.01em}
  nav.navlist{display:flex;flex-direction:column;gap:4px}
  .nav-section{font-size:10.5px;font-weight:700;color:var(--text-dim4);letter-spacing:0.06em;text-transform:uppercase;padding:14px 12px 4px}
  .nav-btn{all:unset;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer}
  .nav-btn .ic{width:18px;text-align:center}

  .main{flex:1;overflow-y:auto;padding:32px 40px}
  .page-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
  .page-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.01em}
  .page-sub{color:var(--text-dim);font-size:14px;margin-top:4px}
  .sg{font-family:'Space Grotesk',sans-serif}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px}
  .card-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px}

  .btn-primary{all:unset;cursor:pointer;padding:10px 16px;border-radius:9px;background:linear-gradient(135deg, var(--accent1), var(--accent2));color:var(--accent-on);font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .btn-danger{all:unset;cursor:pointer;padding:11px 16px;border-radius:9px;background:oklch(0.92 0.08 25);color:oklch(0.5 0.19 25);font-weight:600;font-size:13.5px}
  .btn-ghost{all:unset;cursor:pointer;color:var(--text-dim2)}
  .btn-telegram{all:unset;cursor:pointer;display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:9px;background:oklch(0.55 0.14 235 / 0.14);color:oklch(0.5 0.15 235);font-weight:600;font-size:13px}

  .field label{font-size:12px;color:var(--text-dim2);font-weight:600;display:block;margin-bottom:6px}
  .field input, .field select{width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--border3);border-radius:9px;padding:10px 12px;color:inherit;font-size:14px;font-family:inherit}
  .field{flex:1}

  .search-wrap{position:relative;margin-bottom:16px}
  .search-wrap input{width:100%;box-sizing:border-box;background:var(--panel2);border:1px solid var(--border3);border-radius:10px;padding:11px 40px 11px 14px;color:inherit;font-size:14px;font-family:inherit}
  .search-clear{all:unset;cursor:pointer;position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-dim2);font-size:14px}

  .tabbar{display:flex;gap:4px;background:var(--panel2);border-radius:10px;padding:4px;width:fit-content}
  .tab-btn{all:unset;cursor:pointer;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600}

  .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .t-head{display:grid;padding:14px 20px;color:var(--text-dim3);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;border-bottom:1px solid var(--border)}
  .t-row{display:grid;padding:14px 20px;align-items:center;border-bottom:1px solid var(--border2)}

  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;padding:3px 7px;border-radius:6px;display:inline-block}

  .progress{height:8px;background:var(--track);border-radius:5px;overflow:hidden}
  .progress > div{height:100%;border-radius:5px}

  .modal-backdrop{position:fixed;inset:0;background:oklch(0 0 0 / 0.6);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal-backdrop.chip{z-index:60}
  .modal-box{width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;background:var(--panel2);border:1px solid oklch(1 0 0 / 0.09);border-radius:18px;padding:26px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .modal-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px}
  .modal-close{all:unset;cursor:pointer;color:var(--text-dim2);font-size:18px;padding:4px}
  .modal-fields{display:flex;flex-direction:column;gap:14px}
  .row-2{display:flex;gap:12px}
  .modal-actions{display:flex;gap:10px;margin-top:20px}

  .kanban-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;align-items:flex-start}
  .kanban-col{width:260px;flex:none;background:var(--panel2);border-radius:14px;padding:14px}
  .kanban-col-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 4px}
  .shoot-card{background:var(--card);border:1px solid oklch(1 0 0 / 0.06);border-radius:11px;padding:13px;cursor:grab}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-cell{aspect-ratio:1;border-radius:9px;padding:6px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;cursor:pointer}

  select{appearance:none;-webkit-appearance:none}
  input::placeholder{color:oklch(0.55 0.015 150)}

  .mobile-topbar{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--sidebar);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
  .hamburger-btn{all:unset;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;width:36px;height:36px;flex:none;border-radius:9px;background:var(--card)}
  .hamburger-btn span{display:block;width:16px;height:2px;background:var(--text);border-radius:2px}
  .sidebar-backdrop{position:fixed;inset:0;background:oklch(0 0 0 / 0.55);z-index:39}

  @media (max-width: 860px){
    .app-shell{flex-direction:column;height:auto;min-height:100vh}
    .mobile-topbar{display:flex}
    .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform 0.2s ease-out;box-shadow:4px 0 24px oklch(0 0 0 / 0.4)}
    .sidebar.open{transform:translateX(0)}
    .main{padding:20px 16px;width:100%}
    .table-wrap{overflow-x:auto}
    .t-head,.t-row{min-width:520px}
    .modal-box{width:420px}
    .dash-hero-grid{grid-template-columns:1fr !important}
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js?v=24"></script>
</body>
</html>
